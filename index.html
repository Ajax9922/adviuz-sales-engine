<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Adviuz AI Sales Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        #loading-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; color: white; z-index: 9999; transition: opacity 0.5s ease; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #ffffff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="spinner"></div><p style="margin-top:20px; font-weight:bold; letter-spacing:2px; font-size:10px; text-transform:uppercase;">Adviuz Loading...</p></div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      const SUPABASE_URL = 'https://zkqusvcjxwzcvzhmhwau.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcXVzdmNqeHd6Y3Z6aG1od2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTkxMzIsImV4cCI6MjA5MjYzNTEzMn0.41cvwkL8UIAn5YUB_XDPXGV_6q-QicibGfuW_P_fHoo';
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const SvgIcon = ({ name, size = 20, className = "" }) => {
        const icons = {
          bot: <path d="M12 8V4m0 4a4 4 0 100 8 4 4 0 000-8z" stroke="currentColor" strokeWidth="2" fill="none" />,
          play: <path d="M5 3l14 9-14 9V3z" stroke="currentColor" strokeWidth="2" fill="none" />,
          pause: <path d="M6 4h4v16H6zM14 4h4v16h-4z" stroke="currentColor" strokeWidth="2" fill="none" />,
          user: <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" strokeWidth="2" fill="none" />,
          list: <path d="M8 6h13M8 12h13M8 18h13" stroke="currentColor" strokeWidth="2" fill="none" />,
          chart: <path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" strokeWidth="2" fill="none" />,
          refresh: <path d="M21 12a9 9 0 11-9-9" stroke="currentColor" strokeWidth="2" fill="none" />,
          chevron: <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />,
          phone: <path d="M22 16.92v3a2 2 0 01-2.18 2" stroke="currentColor" strokeWidth="2" fill="none" />
        };
        return <svg width={size} height={size} viewBox="0 0 24 24" className={className} xmlns="http://www.w3.org/2000/svg">{icons[name] || null}</svg>;
      };

      function App() {
        const [session, setSession] = useState(null);
        const [activeTab, setActiveTab] = useState('leads');
        const [selectedLead, setSelectedLead] = useState(null);
        const [leads, setLeads] = useState([]);
        const [loading, setLoading] = useState(false);

        useEffect(() => {
          const loader = document.getElementById('loading-screen');
          if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
          const saved = localStorage.getItem('adviuz_session');
          if (saved) setSession(JSON.parse(saved));
        }, []);

        useEffect(() => { if (session) fetchLeads(); }, [session]);

        const fetchLeads = async () => {
          if (!session) return;
          setLoading(true);
          const { data: leadData } = await db.from('leads').select('*').eq('campaign_id', session.campaign_id).order('created_at', { ascending: false });
          if (leadData) setLeads(leadData);
          
          // Also refresh session data to get latest views_used/status
          const { data: clientData } = await db.from('clients').select('*').eq('id', session.id).single();
          if (clientData) {
            setSession(clientData);
            localStorage.setItem('adviuz_session', JSON.stringify(clientData));
          }
          setLoading(false);
        };

        const toggleCampaign = async () => {
          const newStatus = session.status === 'Active' ? 'Paused' : 'Active';
          await db.from('clients').update({ status: newStatus }).eq('id', session.id);
          fetchLeads();
        };

        const updateLeadStage = async (id, newStage) => {
          setLeads(leads.map(l => l.id === id ? { ...l, stage: newStage } : l));
          await db.from('leads').update({ stage: newStage }).eq('id', id);
        };

        if (!session) return (
            <div className="min-h-screen flex flex-col justify-center px-6 bg-slate-900">
              <div className="w-full max-w-sm mx-auto">
                <div className="w-20 h-20 bg-white rounded-[2rem] flex items-center justify-center shadow-2xl mb-8 mx-auto rotate-3">
                  <SvgIcon name="bot" size={40} className="text-slate-900" />
                </div>
                <h2 className="text-center text-3xl font-black text-white uppercase italic mb-8">Adviuz AI</h2>
                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl">
                  <form onSubmit={async (e)=>{
                    e.preventDefault();
                    const email = e.target.email.value.toLowerCase().trim();
                    const pin = e.target.pin.value;
                    const { data } = await db.from('clients').select('*').eq('email', email).eq('pin', pin).single();
                    if (data) { setSession(data); localStorage.setItem('adviuz_session', JSON.stringify(data)); }
                    else alert("Access Denied");
                  }} className="space-y-4">
                    <input name="email" placeholder="Work Email" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none" required />
                    <input name="pin" type="password" placeholder="PIN" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none" required />
                    <button className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl">Launch Engine</button>
                  </form>
                </div>
              </div>
            </div>
        );

        const leadToWinRate = leads.length > 0 ? Math.round((leads.filter(l => l.stage === 'Closed Won').length / leads.length) * 100) : 0;
        const conversionRate = session.views_used > 0 ? ((leads.length / session.views_used) * 100).toFixed(1) : 0;

        return (
          <div className="h-screen flex flex-col bg-slate-50 overflow-hidden font-sans">
            <header className="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white"><SvgIcon name="bot" size={16}/></div>
                <h1 className="font-black text-slate-900 text-xl tracking-tighter uppercase italic">ADVIUZ</h1>
              </div>
              <button onClick={fetchLeads} className="p-2 text-slate-400"><SvgIcon name="refresh" className={loading?'animate-spin':''}/></button>
            </header>

            <div className="flex-1 overflow-y-auto pb-32">
              {activeTab === 'leads' ? (
                <div className="p-4 space-y-3">
                  <div className="flex justify-between items-end px-2 mt-4">
                    <h2 className="text-2xl font-black text-slate-900 italic uppercase">Leads Queue</h2>
                    <span className="text-[10px] font-black text-white bg-slate-900 px-3 py-1 rounded-full">{leads.length}</span>
                  </div>
                  {leads.map(lead => (
                    <div key={lead.id} onClick={()=>setSelectedLead(lead)} className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex justify-between items-center active:scale-95 transition">
                      <div className="flex items-center gap-4">
                        <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 font-black">{lead.name[0]}</div>
                        <div>
                          <h4 className="font-black text-slate-900">{lead.name}</h4>
                          <p className="text-[10px] text-slate-400 font-bold uppercase">{lead.phone}</p>
                        </div>
                      </div>
                      <span className={`text-[9px] font-black uppercase px-2 py-1 rounded-lg ${lead.stage === 'Closed Won' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>{lead.stage || 'Fresh'}</span>
                    </div>
                  ))}
                </div>
              ) : activeTab === 'analytics' ? (
                <div className="p-6 space-y-6">
                  <h2 className="text-2xl font-black text-slate-900 italic uppercase">Campaign Health</h2>
                  
                  {/* Views Progress */}
                  <div className="bg-slate-900 text-white p-8 rounded-[3rem] shadow-xl relative overflow-hidden">
                    <p className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-2">View Consumption</p>
                    <div className="flex items-end gap-2 mb-4">
                      <span className="text-4xl font-black">{session.views_used || 0}</span>
                      <span className="text-slate-500 font-bold text-sm mb-1">/ {session.view_limit || 0} allotted</span>
                    </div>
                    <div className="w-full h-3 bg-white/10 rounded-full overflow-hidden">
                      <div className="h-full bg-emerald-400 transition-all duration-1000" style={{ width: `${(session.views_used / session.view_limit) * 100}%` }}></div>
                    </div>
                  </div>

                  {/* Funnel Stats */}
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm text-center">
                      <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Capture Rate</p>
                      <p className="text-2xl font-black text-indigo-600">{conversionRate}%</p>
                    </div>
                    <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm text-center">
                      <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Win Rate</p>
                      <p className="text-2xl font-black text-emerald-500">{leadToWinRate}%</p>
                    </div>
                  </div>

                  {/* Quick Controls */}
                  <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Campaign Master Switch</p>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <div className={`w-3 h-3 rounded-full ${session.status === 'Active' ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`}></div>
                        <span className="font-black text-lg uppercase">{session.status}</span>
                      </div>
                      {['Active', 'Paused'].includes(session.status) && (
                        <button onClick={toggleCampaign} className={`px-6 py-3 rounded-2xl font-black text-xs uppercase ${session.status === 'Active' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'}`}>
                          {session.status === 'Active' ? 'Pause Campaign' : 'Resume Campaign'}
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              ) : (
                <div className="p-6 space-y-6">
                  <h2 className="text-2xl font-black text-slate-900 italic uppercase">Account</h2>
                  <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm text-center">
                     <div className="w-24 h-24 bg-slate-50 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-slate-300"><SvgIcon name="user" size={48}/></div>
                     <h3 className="text-xl font-black text-slate-900">{session.email}</h3>
                     <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">{session.campaign_id}</p>
                     <button onClick={()=>{setSession(null); localStorage.removeItem('adviuz_session');}} className="w-full bg-rose-50 text-rose-600 font-black py-5 rounded-2xl mt-10">Secure Log Out</button>
                  </div>
                </div>
              )}
            </div>

            {/* Mobile Lead Detail View */}
            {selectedLead && (
              <div className="fixed inset-0 bg-white z-50 flex flex-col fade-in">
                <div className="h-16 border-b flex items-center px-6">
                  <button onClick={()=>setSelectedLead(null)} className="p-2 -ml-4"><SvgIcon name="chevron"/></button>
                  <h3 className="mx-auto font-black text-sm uppercase tracking-tight">{selectedLead.name}</h3>
                  <div className="w-8"></div>
                </div>
                <div className="flex-1 p-6 space-y-6 bg-slate-50">
                  <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm text-center">
                    <h2 className="text-3xl font-black text-slate-900">{selectedLead.name}</h2>
                    <p className="text-slate-400 font-bold uppercase mt-2">{selectedLead.phone}</p>
                    <a href={`tel:${selectedLead.phone}`} className="mt-8 bg-emerald-500 text-white w-full py-5 rounded-2xl font-black flex justify-center items-center gap-3 shadow-lg"><SvgIcon name="phone"/> Call Now</a>
                  </div>
                  <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-4">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Update Pipeline Stage</p>
                    <select 
                      value={selectedLead.stage || 'Fresh Lead'}
                      onChange={(e)=>updateLeadStage(selectedLead.id, e.target.value)}
                      className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold"
                    >
                      <option value="Fresh Lead">Fresh Lead</option>
                      <option value="In Progress">In Progress</option>
                      <option value="Closed Won">Closed Won</option>
                      <option value="Closed Lost">Closed Lost</option>
                    </select>
                  </div>
                </div>
              </div>
            )}

            <nav className="fixed bottom-0 left-0 right-0 bg-white border-t pb-10 flex justify-around items-center h-20 z-10">
              <button onClick={()=>setActiveTab('leads')} className={activeTab==='leads'?'text-slate-900 scale-110':'text-slate-300 transition-all'}><SvgIcon name="list" size={28}/></button>
              <button onClick={()=>setActiveTab('analytics')} className={activeTab==='analytics'?'text-slate-900 scale-110':'text-slate-300 transition-all'}><SvgIcon name="chart" size={28}/></button>
              <button onClick={()=>setActiveTab('profile')} className={activeTab==='profile'?'text-slate-900 scale-110':'text-slate-300 transition-all'}><SvgIcon name="user" size={28}/></button>
            </nav>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
