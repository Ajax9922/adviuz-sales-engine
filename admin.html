<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adviuz Agency Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .card { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Core Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      
      const SUPABASE_URL = 'https://zkqusvcjxwzcvzhmhwau.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcXVzdmNqeHd6Y3Z6aG1od2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTkxMzIsImV4cCI6MjA5MjYzNTEzMn0.41cvwkL8UIAn5YUB_XDPXGV_6q-QicibGfuW_P_fHoo';
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Simple SVG Icons
      const SvgIcon = ({ name, size = 20, className = "" }) => {
        const icons = {
          plus: <path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" />,
          users: <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 110-8 4 4 0 010 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" strokeWidth="2" fill="none" />,
          leads: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" strokeWidth="2" fill="none" />,
          settings: <path d="M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" strokeWidth="2" fill="none" />,
          logout: <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" strokeWidth="2" fill="none" />,
          trash: <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" strokeWidth="2" fill="none" />
        };
        return <svg width={size} height={size} viewBox="0 0 24 24" className={className} xmlns="http://www.w3.org/2000/svg">{icons[name] || null}</svg>;
      };

      function App() {
        const [session, setSession] = useState(null);
        const [view, setView] = useState('clients'); // 'clients' or 'leads'
        const [clients, setClients] = useState([]);
        const [leads, setLeads] = useState([]);
        const [loading, setLoading] = useState(false);
        const [showAddModal, setShowAddModal] = useState(false);

        // Client Form State
        const [newClient, setNewClient] = useState({ email: '', pin: '', campaign_id: '', role: 'Client' });

        useEffect(() => {
          const saved = localStorage.getItem('adviuz_admin_session');
          if (saved) {
            const data = JSON.parse(saved);
            if (data.role === 'SuperAdmin') setSession(data);
          }
        }, []);

        useEffect(() => {
          if (session) {
            fetchData();
          }
        }, [session, view]);

        const fetchData = async () => {
          setLoading(true);
          if (view === 'clients') {
            const { data } = await db.from('clients').select('*').order('created_at', { ascending: false });
            if (data) setClients(data);
          } else {
            const { data } = await db.from('leads').select('*').order('created_at', { ascending: false });
            if (data) setLeads(data);
          }
          setLoading(false);
        };

        const handleAddClient = async (e) => {
          e.preventDefault();
          const { error } = await db.from('clients').insert([newClient]);
          if (!error) {
            setShowAddModal(false);
            setNewClient({ email: '', pin: '', campaign_id: '', role: 'Client' });
            fetchData();
          } else {
            alert("Error: " + error.message);
          }
        };

        const deleteClient = async (id) => {
            if (window.confirm("Remove this client access?")) {
                await db.from('clients').delete().eq('id', id);
                fetchData();
            }
        };

        const AdminLogin = () => {
          const [email, setEmail] = useState('');
          const [pin, setPin] = useState('');
          const [error, setError] = useState('');

          const handleLogin = async (e) => {
            e.preventDefault();
            const { data, error: dbError } = await db.from('clients')
              .select('*')
              .eq('email', email.toLowerCase().trim())
              .eq('pin', pin)
              .eq('role', 'SuperAdmin')
              .single();

            if (data) {
              localStorage.setItem('adviuz_admin_session', JSON.stringify(data));
              setSession(data);
            } else {
              setError("Unauthorized. SuperAdmin access required.");
            }
          };

          return (
            <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
              <div className="w-full max-w-md bg-white p-10 rounded-[3rem] shadow-2xl">
                <div className="flex justify-center mb-6"><SvgIcon name="bot" size={60} className="text-slate-900"/></div>
                <h1 className="text-2xl font-black text-center text-slate-900 mb-8 uppercase tracking-tighter">Agency Control Center</h1>
                <form onSubmit={handleLogin} className="space-y-4">
                  {error && <div className="p-4 bg-rose-50 text-rose-600 rounded-2xl text-xs font-bold text-center">{error}</div>}
                  <input type="email" placeholder="Admin Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900" required />
                  <input type="password" placeholder="Admin PIN" value={pin} onChange={e=>setPin(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900" required />
                  <button className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg">Authenticate Agency</button>
                </form>
              </div>
            </div>
          );
        };

        if (!session) return <AdminLogin />;

        return (
          <div className="flex min-h-screen flex-col md:flex-row">
            {/* Sidebar */}
            <aside className="w-full md:w-64 bg-slate-900 text-white p-6 flex flex-col">
              <div className="flex items-center gap-3 mb-10">
                <SvgIcon name="bot" size={32} />
                <h1 className="font-black text-xl tracking-tighter">ADVIUZ HUB</h1>
              </div>
              
              <nav className="flex-1 space-y-2">
                <button onClick={()=>setView('clients')} className={`w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition ${view==='clients' ? 'bg-indigo-600' : 'hover:bg-slate-800 text-slate-400'}`}>
                  <SvgIcon name="users" /> Client Access
                </button>
                <button onClick={()=>setView('leads')} className={`w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition ${view==='leads' ? 'bg-indigo-600' : 'hover:bg-slate-800 text-slate-400'}`}>
                  <SvgIcon name="leads" /> Master Leads
                </button>
              </nav>

              <button onClick={()=>{localStorage.removeItem('adviuz_admin_session'); setSession(null);}} className="flex items-center gap-3 p-4 text-slate-500 font-bold hover:text-white transition mt-10">
                <SvgIcon name="logout" /> Logout
              </button>
            </aside>

            {/* Main Content */}
            <main className="flex-1 p-8 md:p-12 overflow-y-auto">
              <header className="flex justify-between items-end mb-10">
                <div>
                  <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tight">{view === 'clients' ? 'Manage Clients' : 'Global Leads'}</h2>
                  <p className="text-slate-400 font-medium">Real-time control over your agency ecosystem.</p>
                </div>
                {view === 'clients' && (
                  <button onClick={()=>setShowAddModal(true)} className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-xl hover:scale-105 transition">
                    <SvgIcon name="plus" size={18} /> New Client
                  </button>
                )}
              </header>

              {loading ? (
                <div className="text-center py-20 text-slate-400 font-bold animate-pulse">Syncing with Hub...</div>
              ) : view === 'clients' ? (
                <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                  {clients.map(client => (
                    <div key={client.id} className="card bg-white p-6 rounded-[2.5rem] relative">
                        <button onClick={()=>deleteClient(client.id)} className="absolute top-6 right-6 text-slate-300 hover:text-rose-500 transition"><SvgIcon name="trash" size={18}/></button>
                        <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 mb-4 font-black">{client.role === 'SuperAdmin' ? '⭐' : '💼'}</div>
                        <h3 className="font-black text-slate-900 text-lg truncate pr-8">{client.email}</h3>
                        <p className="text-[10px] font-black text-indigo-600 uppercase tracking-widest mt-1">{client.campaign_id}</p>
                        
                        <div className="mt-6 flex justify-between items-center pt-6 border-t border-slate-50">
                            <div>
                                <p className="text-[10px] font-black text-slate-300 uppercase">PIN CODE</p>
                                <p className="font-mono font-bold text-slate-600">{client.pin}</p>
                            </div>
                            <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${client.role === 'SuperAdmin' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500'}`}>{client.role}</span>
                        </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-slate-50 border-b border-slate-100">
                      <tr>
                        <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Lead Name</th>
                        <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Campaign</th>
                        <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Stage</th>
                        <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Date</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {leads.map(lead => (
                        <tr key={lead.id} className="hover:bg-slate-50 transition">
                          <td className="px-6 py-4">
                            <p className="font-bold text-slate-900">{lead.name}</p>
                            <p className="text-xs text-slate-400">{lead.phone}</p>
                          </td>
                          <td className="px-6 py-4">
                            <span className="text-xs font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg uppercase tracking-wider">{lead.campaign_id}</span>
                          </td>
                          <td className="px-6 py-4">
                            <span className="text-[10px] font-black uppercase px-2 py-1 rounded-full bg-slate-100 text-slate-500">{lead.stage || 'Fresh'}</span>
                          </td>
                          <td className="px-6 py-4 text-right text-xs text-slate-400 font-bold">
                            {new Date(lead.created_at).toLocaleDateString()}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </main>

            {/* Add Client Modal */}
            {showAddModal && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                <div className="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl relative animate-in fade-in zoom-in duration-200">
                  <h3 className="text-2xl font-black text-slate-900 mb-6 uppercase">Onboard Client</h3>
                  <form onSubmit={handleAddClient} className="space-y-4">
                    <div>
                      <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Work Email</label>
                      <input type="email" required value={newClient.email} onChange={e=>setNewClient({...newClient, email: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Secure PIN</label>
                        <input type="text" maxLength={6} required value={newClient.pin} onChange={e=>setNewClient({...newClient, pin: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900 text-center font-bold" />
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Campaign ID</label>
                        <input type="text" required value={newClient.campaign_id} onChange={e=>setNewClient({...newClient, campaign_id: e.target.value.toUpperCase()})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900 text-center font-bold" placeholder="LASER_01" />
                      </div>
                    </div>
                    <div>
                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Access Level</label>
                        <select value={newClient.role} onChange={e=>setNewClient({...newClient, role: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900 font-bold appearance-none">
                            <option value="Client">Client</option>
                            <option value="SuperAdmin">Agency Owner (SuperAdmin)</option>
                        </select>
                    </div>
                    <div className="flex gap-4 pt-4">
                      <button type="button" onClick={()=>setShowAddModal(false)} className="flex-1 text-slate-400 font-black py-4 uppercase">Cancel</button>
                      <button type="submit" className="flex-1 bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg">Save Client</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
