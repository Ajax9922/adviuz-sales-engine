<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adviuz Agency Hub | Enterprise Control</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f1f5f9; 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0;
            padding: 0;
        }
        .card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #e2e8f0; 
        }
        .card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
        }
        .gold-glow { 
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); 
            border: 2px solid #f59e0b; 
        }
        .animate-slide-up { 
            animation: slideUp 0.4s ease-out; 
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* Custom scrollbar for enterprise feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Core Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      
      // ==========================================
      // ADVIUZ HUB CONFIGURATION
      const SUPABASE_URL = 'https://zkqusvcjxwzcvzhmhwau.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcXVzdmNqeHd6Y3Z6aG1od2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTkxMzIsImV4cCI6MjA5MjYzNTEzMn0.41cvwkL8UIAn5YUB_XDPXGV_6q-QicibGfuW_P_fHoo';
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      // ==========================================

      const SvgIcon = ({ name, size = 20, className = "" }) => {
        const icons = {
          plus: <path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" />,
          users: <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 110-8 4 4 0 010 8z" stroke="currentColor" strokeWidth="2" fill="none" />,
          leads: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01" stroke="currentColor" strokeWidth="2" fill="none" />,
          logout: <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" strokeWidth="2" fill="none" />,
          trophy: <path d="M6 9V2h12v7M6 9a5 5 0 110-10M18 9a5 5 0 100-10M4 22h16M10 14.66V17" stroke="currentColor" strokeWidth="2" fill="none" />,
          play: <path d="M5 3l14 9-14 9V3z" stroke="currentColor" strokeWidth="2" fill="none" />,
          pause: <path d="M6 4h4v16H6zM14 4h4v16h-4z" stroke="currentColor" strokeWidth="2" fill="none" />,
          stop: <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" strokeWidth="2" fill="none" />,
          trash: <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6" stroke="currentColor" strokeWidth="2" fill="none" />
        };
        return <svg width={size} height={size} viewBox="0 0 24 24" className={className} xmlns="http://www.w3.org/2000/svg">{icons[name] || null}</svg>;
      };

      function App() {
        const [session, setSession] = useState(null);
        const [activeView, setActiveView] = useState('leaderboard'); 
        const [clients, setClients] = useState([]);
        const [leads, setLeads] = useState([]);
        const [loading, setLoading] = useState(false);
        const [showAddModal, setShowAddModal] = useState(false);
        
        const [newClient, setNewClient] = useState({ email: '', pin: '', campaign_id: '', store_name: '', role: 'Client', view_limit: 1000, status: 'Active' });

        useEffect(() => {
          const saved = localStorage.getItem('adviuz_admin_session');
          if (saved) {
            const data = JSON.parse(saved);
            if (data.role === 'SuperAdmin' || data.role === 'Employee') setSession(data);
          }
        }, []);

        useEffect(() => { if (session) fetchData(); }, [session, activeView]);

        const fetchData = async () => {
          setLoading(true);
          const { data: clientsData } = await db.from('clients').select('*').order('created_at', { ascending: false });
          const { data: leadsData } = await db.from('leads').select('*').order('created_at', { ascending: false });
          
          if (clientsData) setClients(clientsData);
          if (leadsData) setLeads(leadsData);
          setLoading(false);
        };

        const updateClientStatus = async (id, status) => {
          await db.from('clients').update({ status }).eq('id', id);
          fetchData();
        };

        const updateClientLimit = async (id, limit) => {
          await db.from('clients').update({ view_limit: parseInt(limit) }).eq('id', id);
          fetchData();
        };

        const handleAddClient = async (e) => {
          e.preventDefault();
          const { error } = await db.from('clients').insert([newClient]);
          if (!error) {
            setShowAddModal(false);
            setNewClient({ email: '', pin: '', campaign_id: '', store_name: '', role: 'Client', view_limit: 1000, status: 'Active' });
            fetchData();
          } else {
            alert("Error: " + error.message);
          }
        };

        const leaderboard = useMemo(() => {
            return clients
                .filter(c => c.role === 'Client')
                .map(client => {
                    const storeLeads = leads.filter(l => l.campaign_id === client.campaign_id);
                    const wins = storeLeads.filter(l => l.stage === 'Closed Won').length;
                    return {
                        ...client,
                        leadCount: storeLeads.length,
                        winCount: wins,
                        conversion: storeLeads.length > 0 ? Math.round((wins / storeLeads.length) * 100) : 0
                    };
                })
                .sort((a, b) => b.winCount - a.winCount || b.leadCount - a.leadCount);
        }, [clients, leads]);

        if (!session) return (
            <div className="min-h-screen flex items-center justify-center bg-slate-900 p-6 font-sans">
              <div className="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl">
                <div className="flex justify-center mb-6"><div className="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center text-white"><SvgIcon name="trophy" size={32}/></div></div>
                <h1 className="text-2xl font-black text-center mb-8 uppercase italic tracking-tighter">Adviuz Agency Control</h1>
                <form onSubmit={async (e)=>{
                  e.preventDefault();
                  const email = e.target.email.value.toLowerCase().trim();
                  const pin = e.target.pin.value;
                  const { data, error } = await db.from('clients').select('*').eq('email', email).eq('pin', pin).single();
                  
                  if (data && (data.role === 'SuperAdmin' || data.role === 'Employee')) {
                    setSession(data); 
                    localStorage.setItem('adviuz_admin_session', JSON.stringify(data));
                  } else {
                    alert("Unauthorized Access. Admin credentials required.");
                  }
                }} className="space-y-4">
                  <input name="email" placeholder="Admin Email" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900 transition-all" required />
                  <input name="pin" type="password" placeholder="Master PIN" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-slate-900 transition-all" required />
                  <button className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-slate-800 active:scale-95 transition-all">Launch Dashboard</button>
                </form>
              </div>
            </div>
        );

        return (
          <div className="flex min-h-screen font-sans">
            {/* Enterprise Sidebar */}
            <aside className="w-72 bg-slate-900 text-white p-8 flex flex-col shrink-0 sticky top-0 h-screen">
              <div className="flex items-center gap-3 mb-12">
                <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-slate-900 shadow-lg"><SvgIcon name="trophy" size={24}/></div>
                <h1 className="font-black text-xl tracking-tighter italic">ADVIUZ HUB</h1>
              </div>
              
              <nav className="flex-1 space-y-3">
                <button onClick={()=>setActiveView('leaderboard')} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold transition ${activeView==='leaderboard' ? 'bg-indigo-600 shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                  <SvgIcon name="trophy" /> Performance Ranking
                </button>
                <button onClick={()=>setActiveView('clients')} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold transition ${activeView==='clients' ? 'bg-indigo-600 shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                  <SvgIcon name="users" /> Store Directory
                </button>
                <button onClick={()=>setActiveView('leads')} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold transition ${activeView==='leads' ? 'bg-indigo-600 shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                  <SvgIcon name="leads" /> Global Feed
                </button>
              </nav>

              <button onClick={()=>{setSession(null); localStorage.removeItem('adviuz_admin_session');}} className="flex items-center gap-4 p-4 text-slate-500 font-bold hover:text-rose-400 transition mt-auto">
                <SvgIcon name="logout" /> Exit Portal
              </button>
            </aside>

            {/* Content Area */}
            <main className="flex-1 p-12 overflow-y-auto">
              <header className="flex justify-between items-end mb-12">
                <div>
                  <h2 className="text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">
                    {activeView === 'leaderboard' ? 'Performance Ranking' : activeView === 'clients' ? 'Store Management' : 'Master Leads'}
                  </h2>
                  <p className="text-slate-400 font-bold text-xs mt-3 uppercase tracking-widest leading-none">Enterprise Level Intelligence</p>
                </div>
                {activeView === 'clients' && (
                  <button onClick={()=>setShowAddModal(true)} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition flex items-center gap-2">
                    <SvgIcon name="plus" size={20}/> Onboard Store
                  </button>
                )}
              </header>

              {loading ? (
                <div className="flex flex-col items-center justify-center py-32 text-slate-300 font-black uppercase tracking-widest animate-pulse">
                    <div className="w-12 h-12 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin mb-4"></div>
                    Syncing Enterprise Hub...
                </div>
              ) : activeView === 'leaderboard' ? (
                <div className="space-y-6 animate-slide-up">
                  {leaderboard.map((store, idx) => (
                    <div key={store.id} className={`card bg-white p-8 rounded-[3rem] shadow-sm flex items-center gap-8 ${idx === 0 ? 'gold-glow' : ''}`}>
                       <div className="w-16 h-16 rounded-full bg-slate-900 text-white flex items-center justify-center text-2xl font-black shrink-0 shadow-lg italic">
                          #{idx + 1}
                       </div>
                       <div className="flex-1">
                          <h3 className="text-2xl font-black text-slate-900 leading-none">{store.store_name || 'Anonymous Store'}</h3>
                          <p className="text-indigo-600 font-bold text-xs uppercase tracking-widest mt-1">{store.campaign_id}</p>
                       </div>
                       <div className="flex gap-12 text-center items-center">
                          <div>
                             <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Leads</p>
                             <p className="text-3xl font-black text-slate-900">{store.leadCount}</p>
                          </div>
                          <div>
                             <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Closed Wins</p>
                             <p className="text-3xl font-black text-emerald-500">{store.winCount}</p>
                          </div>
                          <div className="bg-slate-50 px-8 py-4 rounded-3xl border border-slate-100">
                             <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Conversion</p>
                             <p className="text-3xl font-black text-slate-900">{store.conversion}%</p>
                          </div>
                       </div>
                    </div>
                  ))}
                </div>
              ) : activeView === 'clients' ? (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-slide-up">
                  {clients.map(client => (
                    <div key={client.id} className="card bg-white p-10 rounded-[3.5rem] shadow-sm relative overflow-hidden">
                      <div className="flex justify-between items-start mb-8">
                        <div>
                          <h3 className="text-2xl font-black text-slate-900 mb-1 leading-tight">{client.store_name || 'New Store'}</h3>
                          <p className="text-indigo-600 font-bold text-xs uppercase tracking-widest">{client.campaign_id} • {client.email}</p>
                        </div>
                        <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${
                          client.status === 'Active' ? 'bg-emerald-100 text-emerald-700' : 
                          client.status === 'Paused' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'
                        }`}>{client.status}</span>
                      </div>

                      {/* View Allotment Controls */}
                      <div className="grid grid-cols-2 gap-6 mb-10">
                        <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                          <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">View Allotment</p>
                          <input 
                            type="number" 
                            defaultValue={client.view_limit} 
                            onBlur={(e)=>updateClientLimit(client.id, e.target.value)}
                            className="bg-transparent font-black text-3xl w-full outline-none text-slate-900"
                          />
                        </div>
                        <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                          <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Used Views</p>
                          <p className="font-black text-3xl text-slate-900">{client.views_used || 0}</p>
                        </div>
                      </div>

                      {/* Status Master Controls */}
                      <div className="flex items-center gap-3 pt-8 border-t border-slate-50">
                        <button onClick={()=>updateClientStatus(client.id, 'Active')} className={`flex-1 h-14 rounded-2xl flex items-center justify-center transition-all ${client.status==='Active'?'bg-emerald-500 text-white shadow-lg':'bg-slate-50 text-slate-300 hover:bg-slate-100'}`} title="Start Campaign"><SvgIcon name="play" size={24}/></button>
                        <button onClick={()=>updateClientStatus(client.id, 'Paused')} className={`flex-1 h-14 rounded-2xl flex items-center justify-center transition-all ${client.status==='Paused'?'bg-amber-500 text-white shadow-lg':'bg-slate-50 text-slate-300 hover:bg-slate-100'}`} title="Pause Campaign"><SvgIcon name="pause" size={24}/></button>
                        <button onClick={()=>updateClientStatus(client.id, 'Hold')} className={`flex-1 h-14 rounded-2xl flex items-center justify-center transition-all ${client.status==='Hold'?'bg-slate-900 text-white shadow-lg':'bg-slate-50 text-slate-300 hover:bg-slate-100'}`} title="Place on Hold"><SvgIcon name="stop" size={24}/></button>
                        <button onClick={()=>updateClientStatus(client.id, 'Ended')} className={`flex-1 h-14 rounded-2xl flex items-center justify-center transition-all ${client.status==='Ended'?'bg-rose-500 text-white shadow-lg':'bg-slate-50 text-slate-300 hover:bg-slate-100'}`} title="End Campaign"><SvgIcon name="trash" size={24}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden animate-slide-up">
                  <table className="w-full text-left">
                    <thead>
                      <tr className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                        <th className="p-8">Lead Information</th>
                        <th className="p-8">Origin Location</th>
                        <th className="p-8">Current Stage</th>
                        <th className="p-8 text-right">Captured On</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {leads.map(lead => (
                        <tr key={lead.id} className="hover:bg-slate-50/50 transition">
                          <td className="p-8">
                            <p className="font-black text-slate-900 text-lg leading-none">{lead.name || 'Anonymous'}</p>
                            <p className="text-slate-400 text-sm font-bold mt-2 uppercase tracking-tighter">{lead.phone}</p>
                          </td>
                          <td className="p-8">
                            <span className="font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg text-xs uppercase tracking-tighter">
                                {clients.find(c => c.campaign_id === lead.campaign_id)?.store_name || lead.campaign_id}
                            </span>
                          </td>
                          <td className="p-8">
                            <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-full ${lead.stage === 'Closed Won' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                {lead.stage || 'Fresh'}
                            </span>
                          </td>
                          <td className="p-8 text-right font-bold text-slate-400 text-sm">
                            {new Date(lead.created_at).toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'})}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </main>

            {/* Onboard Modal */}
            {showAddModal && (
              <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-6">
                <form onSubmit={handleAddClient} className="bg-white w-full max-w-md p-12 rounded-[4rem] shadow-2xl space-y-5 animate-slide-up">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-3xl font-black uppercase italic tracking-tighter">Link New Store</h3>
                    <button type="button" onClick={()=>setShowAddModal(false)} className="text-slate-300 hover:text-slate-900 text-2xl">&times;</button>
                  </div>
                  <input placeholder="Branding (e.g. Toronto North)" value={newClient.store_name} onChange={e=>setNewClient({...newClient, store_name:e.target.value})} className="w-full p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-slate-900 transition-all font-bold" required />
                  <input placeholder="Owner Email" value={newClient.email} onChange={e=>setNewClient({...newClient, email:e.target.value})} className="w-full p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-slate-900 transition-all font-bold" required />
                  <div className="grid grid-cols-2 gap-4">
                    <input placeholder="Access PIN" value={newClient.pin} onChange={e=>setNewClient({...newClient, pin:e.target.value})} className="w-full p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-slate-900 transition-all font-bold text-center" required />
                    <input placeholder="Campaign ID" value={newClient.campaign_id} onChange={e=>setNewClient({...newClient, campaign_id:e.target.value.toUpperCase()})} className="w-full p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-slate-900 transition-all font-bold text-center" required />
                  </div>
                  <div className="bg-slate-50 p-5 rounded-3xl border-2 border-slate-100">
                     <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Access Role</p>
                     <select value={newClient.role} onChange={e=>setNewClient({...newClient, role:e.target.value})} className="bg-transparent w-full font-bold outline-none">
                        <option value="Client">Standard Store Access</option>
                        <option value="Employee">Agency Employee</option>
                        <option value="Reseller">Reseller Partner</option>
                        <option value="SuperAdmin">Agency Owner (SuperAdmin)</option>
                     </select>
                  </div>
                  <button type="submit" className="w-full bg-slate-900 text-white font-black py-5 rounded-3xl shadow-2xl hover:bg-slate-800 transition-all mt-6">Authorize Store</button>
                </form>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
